<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css"/>
        <link rel="stylesheet" href="../css/color.css"/>
        <link rel="stylesheet" href="../css/dashboard.css"/>
        <title>Dashboard</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
 <body>
        <header id="header">
            <h1 id="tituloDashbord">SystemStock</h1>
            <nav>
                <ul>
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Gerenciamento</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="resumoEstoque">
                <div class="card-resumo">
                    <h2 class="titulo-card">Entrada</h2>
                    <p class="valor-card">100</p>
                </div>
                <div class="card-resumo">
                    <h2 class="titulo-card">Saída</h2>
                    <p class="valor-card">80</p>
                </div>
                <div class="card-resumo">
                    <h2 class="titulo-card">Total</h2>
                    <p class="valor-card">20</p>
                </div>
            </section>
            <section id="filtro">
                <div class="grupo=filtro">
                    <label for="filtroData">Data</label>
                    <input type="date" id="filtroData" >
                </div>
                <div class="grupo-filtro">
                    <label for="tipoMovimento"> Tipo </label>
                    <select id="tipoMovimentação" class="select-filtro">
                        <option value="">Selecione uma opção</option>
                        <option value="entrada">Entrada</option>
                        <option value="saida">Saída</option>
                    </select>
                </div>
                <div class="grupo=filtro pesquisa-nome">
                    <label for="pesquisarNome">Pesquisar Item</label>
                    <input type="Text" id="pesquisarNome" class="input-filtro" placeholder="Digite o nome do produto">
                </div>
                <div class="grupo=filtro botao-pesquisa">
                    <button id="btnPesquisar" class="btnPesquisa">Pesquisar</button>
                </div>
            </section>
            <section id="tabelaEstoqueContainer">
                <div class="tabela-wrapper">
                    <table id="tabelaEstoque">
                        <thead>
                            <tr>
                                <th>Código de Barra</th>
                                <th>Nome</th>
                                <th>Fabricante</th>
                                <th>Marca</th>
                                <th>Quantidade</th>
                                <th>Valor Unitário</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela">
                            <tr class="linha-item">
                                <td>987654321</td>
                                <td>Monster E</td>
                                <td>Monster B. C.</td>
                                <td>Monster</td>
                                <td>145</td>
                                <td>10,99</td>
                                <td>10,99</td>
                            </tr>
                            <tr class="linha-item">
                                <td>987654321</td>
                                <td>Palha italiana</td>
                                <td>M.</td>
                                <td>Monster</td>
                                <td>145</td>
                                <td>10,99</td>
                                <td>10,99</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
            <section id="paginação">
                <div class="controle-paginação">
                    <label for="página">Página</label>
                    <select id="página">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <div class="container-btn">
                    <button id="btnVoltar" class="btnVoltar">Voltar</button>
                    <button id="btnProximo" class="btnProximo">Próximo</button>
                </div>
            </section>
        </main>
    </body>
</html>
